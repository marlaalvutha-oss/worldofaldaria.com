<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Heart of Aldaria — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --blue-glow: #3ab8ff;
      --blue-deep: #0a4f7a;
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --dark: #050810;
      --mid: #0c1322;
      --purple: #7b3fa0;
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: #e8dfc8;
      font-family: 'IM Fell English', Georgia, serif;
      overflow-x: hidden;
    }

    /* ── Starfield ── */
    #stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* ── Ambient glow blobs ── */
    .blob {
      position: fixed; border-radius: 50%; filter: blur(120px);
      opacity: .18; pointer-events: none; z-index: 0;
      animation: drift 18s ease-in-out infinite alternate;
    }
    .blob-blue  { width: 600px; height: 600px; background: #1a6fff; top: -150px; left: -150px; animation-duration: 20s; }
    .blob-purple{ width: 500px; height: 500px; background: #6a1fb5; bottom: -100px; right: -100px; animation-duration: 25s; }
    .blob-gold  { width: 300px; height: 300px; background: #c97c10; bottom: 20%; left: 40%; animation-duration: 16s; }
    @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(40px, 30px) scale(1.1); } }

    /* ── Layout ── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px 20px 60px;
      gap: 0;
    }

    /* ── Logo ── */
    .logo-wrap {
      animation: fadeDown .9s ease both;
    }
    .logo-img {
      width: min(560px, 90vw);
      filter: drop-shadow(0 0 24px rgba(58,184,255,.55)) drop-shadow(0 0 60px rgba(58,184,255,.25));
    }

    /* ── Divider ── */
    .divider {
      width: min(420px, 80vw); height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), var(--blue-glow), var(--gold), transparent);
      margin: 6px 0 24px;
      animation: fadeIn 1.2s .4s ease both;
      position: relative;
    }
    .divider::before, .divider::after {
      content: '✦';
      position: absolute; top: 50%; transform: translateY(-50%);
      color: var(--gold-light); font-size: 14px;
    }
    .divider::before { left: -4px; }
    .divider::after  { right: -4px; }

    .series-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(28px, 5.5vw, 58px);
      font-weight: 900;
      letter-spacing: .08em;
      text-align: center;
      background: linear-gradient(180deg, #f0d080 0%, #c9a84c 50%, #f0d080 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 18px rgba(201,168,76,.6));
      margin-bottom: 10px;
      animation: fadeDown .9s .2s ease both;
    }

    
    .coming-soon {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(11px, 2.2vw, 15px);
      letter-spacing: .45em;
      text-transform: uppercase;
      color: var(--gold-light);
      text-shadow: 0 0 18px rgba(201,168,76,.7);
      animation: fadeIn 1.2s .6s ease both;
      margin-bottom: 32px;
    }

    /* ── Character image ── */
    .char-wrap {
      position: relative;
      animation: fadeUp 1s .5s ease both;
    }
    .char-img {
      width: min(400px, 82vw);
      filter:
        drop-shadow(0 0 30px rgba(58,184,255,.4))
        drop-shadow(0 8px 40px rgba(123,63,160,.5));
      transition: filter .4s;
    }
    .char-img:hover {
      filter:
        drop-shadow(0 0 50px rgba(58,184,255,.7))
        drop-shadow(0 8px 60px rgba(201,120,16,.5));
    }

    /* ── Tagline ── */
    .tagline {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: clamp(15px, 2.8vw, 22px);
      color: #c8d8ee;
      text-align: center;
      max-width: 500px;
      line-height: 1.6;
      text-shadow: 0 0 20px rgba(58,184,255,.3);
      margin-top: 28px;
      animation: fadeIn 1.4s .9s ease both;
    }

    /* ── Bottom ornament ── */
    .ornament {
      margin-top: 36px;
      font-family: 'Cinzel', serif;
      font-size: clamp(9px, 1.6vw, 12px);
      letter-spacing: .3em;
      color: var(--gold);
      opacity: .65;
      animation: fadeIn 1.5s 1.1s ease both;
    }

    /* ── Animations ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── Floating particles ── */
    .particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .particle {
      position: absolute;
      border-radius: 50%;
      animation: float linear infinite;
      opacity: 0;
    }
    @keyframes float {
      0%   { opacity: 0; transform: translateY(100vh) scale(.5); }
      10%  { opacity: .8; }
      90%  { opacity: .4; }
      100% { opacity: 0; transform: translateY(-10vh) scale(1.2); }
    }
  </style>
</head>
<body>

<canvas id="stars"></canvas>
<div class="blob blob-blue"></div>
<div class="blob blob-purple"></div>
<div class="blob blob-gold"></div>
<div class="particles" id="particles"></div>

<div class="page">
  <div class="logo-wrap">
    <img class="logo-img" src="Aldaria Word.png" alt="World of Aldaria"/>
  </div>

  <div class="divider"></div>
  <div class="series-title">Heart of Aldaria</div>
  <div class="coming-soon">Coming Soon</div>

  <div class="char-wrap">
    <img class="char-img" src="Aldaria Main.png" alt="Characters of Aldaria"/>
  </div>

  <p class="tagline">
    Magic, mayhem &amp; something far more dangerous&hellip;<br/>
    <em>falling in love.</em>
  </p>

  <p class="ornament">⚔ &nbsp; A FANTASY ROMANCE COMEDY SERIES &nbsp; ⚔</p>
</div>

<script>
  /* ── Starfield ── */
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  function resizeCanvas() { canvas.width = innerWidth; canvas.height = innerHeight; }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  const stars = Array.from({length: 220}, () => ({
    x: Math.random(), y: Math.random(),
    r: Math.random() * 1.6 + .2,
    a: Math.random(),
    speed: Math.random() * .004 + .001,
    phase: Math.random() * Math.PI * 2
  }));

  function drawStars(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      const alpha = s.a * (.5 + .5 * Math.sin(t * s.speed + s.phase));
      ctx.beginPath();
      ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(200,220,255,${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  requestAnimationFrame(drawStars);

  /* ── Floating magic particles ── */
  const pContainer = document.getElementById('particles');
  const colors = ['#3ab8ff','#7b3fa0','#c9a84c','#ffffff','#ff9944'];
  for (let i = 0; i < 35; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 5 + 2;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${Math.random()*12+8}s;
      animation-delay:${Math.random()*10}s;
      filter:blur(${Math.random()*2}px);
      box-shadow:0 0 ${size*2}px currentColor;
    `;
    pContainer.appendChild(p);
  }
</script>
</body>
</html>
